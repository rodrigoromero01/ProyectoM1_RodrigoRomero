    <header class="header">
        <h1>
            <span class="title-word">Generador</span>
            <span class="title-word title-word-accent">de Paletas</span>
            <span class="title-word">Interactivo</span>
            <span class="title-icon" aria-hidden="true">🖌️</span>
        </h1>
        
        <p>Generá colores aleatorios para tus proyectos.</p>
    </header>

    <main>
        <section class="controls">

            <div class="control-group">
                <label for="cantidad">
                    Cantidad de colores
                </label>

                <select id="cantidad" name="cantidad">

                    <option value="6">6</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                
                </select>
            </div>

            <div class="control-group">
                <label for="formato">Formato</label>

                <select id="formato">
                    <option value="hex">HEX</option>
                    <option value="hsl">HSL</option>
                </select>
            </div>

            <button id="generar" type="button"> 

                Generar paleta

            </button>

        </section>

        <section id="paleta">

        </section>

    </main>

        id="toast"
        class="toast">
