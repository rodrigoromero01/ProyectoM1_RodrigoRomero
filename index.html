<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de colores</title>
    <link rel="stylesheet" href="css/styles.css">    
</head>

<body>
    <header> 
    <h1>Selector de colores</h1>
    <h2>Elige tu color favorito</h2>
    </header>

    <main>
        <section class="color-selector">
            <label for="cantidad">
                Cantidad de colores
            </label>

            <select id="cantidad">

                <option value="6">6</option>
                <option value="8">8</option>
                <option value="9">9</option>
            </select>

            <button id="generar">
                Generar paleta
            </button>

        </section>

        <section id="paleta">

        </section>

    </main>
    
    <script src="js/script.js"></script>
    
    <footer>
        <p>© 2024 Selector de colores. Todos los derechos reservados.</p>       


</body>

</html>
