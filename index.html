    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

    <header class="header">
        <h1>Generador de Paletas Interactivo</h1>
        
        <p>Generá colores aleatorios para tus proyectos.</p>
    </header>

    <main>
        <section>
            <label for="cantidad">
                Cantidad de colores
            </label>

            <select id="cantidad" name="cantidad">

                <option value="6">6</option>
                <option value="8">8</option>
                <option value="9">9</option>
            
            </select>

                <label for="formato">Formato</label>

            <select id="formato">
                <option value="hex">HEX</option>
                <option value="hsl">HSL</option>
            </select>

            <button id="generar" type="button"> 

                Generar paleta

            </button>

        </section>

        <section id="paleta">

        </section>

    </main>
    
    <div 
        id="toast"
        class="toast">
    </div>
